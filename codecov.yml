codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

ignore:
  - "grafana/**"
  - "devops/**"
  - "backend/mocks/**"
  - "backend/test/**"
  - "backend/python/test/**"
  - "**/mock_*.go"
  - "**/*_mock.go"
  - "**/*_test.go"
  - "**/*_test.py"

flags:
  unit-tests-go:
    carryforward: true
    paths:
      - backend/plugins/aireview/
      - backend/plugins/codecov/
      - backend/plugins/testregistry/

comment:
  layout: "reach,diff,flags,files,footer"
  require_changes: true
