name: unit-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, release-*]
    paths:
      - '**.go'
      - '**.py'
      - '**.toml'
      - '**.sh'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/*.yml'
      - 'test/**'
  schedule:
    - cron: '0 0 * * *' # run ci every night

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    container: mericodev/lake-builder:latest
    permissions:
      id-token: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Set git config
      run: git config --global --add safe.directory $(pwd)
    - name: Build Python
      run: |
        cd backend
        echo "Building Python"
        make build-python
    - name: Cache unit-test
      id: cache-unit-test
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/go-build
          ${{ env.GOPATH }}/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Go unit tests
      run: |
        go version
        cp env.example .env
        cd backend
        make mock
        make unit-test-go || echo "::warning::Go unit tests had failures (coverage still uploaded)"
    - name: Python unit tests
      run: |
        cd backend
        COVERAGE_OUTPUT_DIR=coverage make unit-test-python || echo "::warning::Python unit tests had failures (coverage still uploaded)"
    - name: Install gpg for Codecov
      if: always()
      run: apt-get update -qq && apt-get install -y -qq gpg > /dev/null 2>&1
    - name: Custom plugins coverage
      if: always()
      run: |
        cd backend
        bash scripts/coverage-custom-plugins.sh
    - name: Upload Go coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        use_oidc: true
        flags: unit-tests-go
        files: backend/coverage-custom-plugins.out
        fail_ci_if_error: false
    - name: Upload Python coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        use_oidc: true
        flags: unit-tests-python
        directory: backend/python/coverage
        fail_ci_if_error: false
