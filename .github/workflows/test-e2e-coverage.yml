name: test-e2e-coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-coverage:
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Create .env file
      run: |
        cp env.example .env
        sed -i 's|127.0.0.1:3306|mysql:3306|g' .env

    - name: Start services with coverage
      run: |
        docker compose -f docker-compose-dev.yml -f docker-compose-e2e-coverage.yml up -d --build
      env:
        ENCRYPTION_SECRET: "e2etestsecrete2etestsecrete2etestsecrete2etestsecrete2etestsecrete2etestsecrete2etestsecrete2etestsecrete2etestsecrete2etestsecret"

    - name: Wait for API to be ready
      run: |
        echo "Waiting for DevLake API..."
        for i in $(seq 1 120); do
          if curl -s http://localhost:8080/ping > /dev/null 2>&1; then
            echo "API ready after ${i}s"
            break
          fi
          sleep 2
        done
        curl -sf http://localhost:8080/ping || (echo "API failed to start"; docker compose -f docker-compose-dev.yml -f docker-compose-e2e-coverage.yml logs devlake mysql; exit 1)

    - name: Trigger and wait for DB migration
      run: |
        curl -s http://localhost:8080/proceed-db-migration || true
        echo "Waiting for migration to complete..."
        for i in $(seq 1 60); do
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/blueprints)
          if [ "$code" != "428" ]; then
            echo "Migration complete (HTTP $code) after ${i}0s"
            break
          fi
          sleep 10
        done

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'

    - name: Wait for Config-UI to be ready
      run: |
        echo "Waiting for Config-UI..."
        for i in $(seq 1 60); do
          if curl -s http://localhost:4000 > /dev/null 2>&1; then
            echo "Config-UI ready after ${i}s"
            break
          fi
          sleep 2
        done
        curl -sf http://localhost:4000 || (echo "Config-UI failed to start"; docker compose -f docker-compose-dev.yml -f docker-compose-e2e-coverage.yml logs config-ui; exit 1)

    - name: Install e2e dependencies
      run: |
        cd e2e
        npm ci
        npx playwright install chromium --with-deps

    - name: Run Playwright e2e tests
      run: |
        cd e2e
        npx playwright test basic-flow.spec.ts

    - name: Collect Go e2e coverage via coverport
      if: always()
      run: |
        mkdir -p e2e-coverage && chmod 777 e2e-coverage
        docker run --rm \
          --network host \
          -v $PWD/e2e-coverage:/workspace/coverage-output \
          quay.io/konflux-ci/konflux-devprod/coverport-cli@sha256:66a419b0759f61d7aefc3fe00fc60bbe4dc12e657f4b7b3c66d3dfb6c7bbb981 \
          collect \
            --url http://localhost:9095 \
            --test-name=e2e-tests \
            --output=/workspace/coverage-output || echo "::warning::Coverage collection failed"

        if ls e2e-coverage/*/e2e-tests/coverage.out 2>/dev/null; then
          cp $(ls e2e-coverage/*/e2e-tests/coverage.out | head -1) e2e-coverage/go-coverage.out
          echo "Go e2e coverage collected"
          head -5 e2e-coverage/go-coverage.out
        elif [ -f e2e-coverage/coverage.out ]; then
          cp e2e-coverage/coverage.out e2e-coverage/go-coverage.out
          echo "Go e2e coverage collected (flat output)"
        else
          echo "::warning::No coverage.out found in e2e-coverage/"
          find e2e-coverage/ -type f 2>/dev/null || true
        fi

    - name: Install gpg for Codecov
      if: always()
      run: sudo apt-get update -qq && sudo apt-get install -y -qq gpg > /dev/null 2>&1

    - name: Upload Go e2e coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        use_oidc: true
        flags: e2e-go
        files: e2e-coverage/go-coverage.out
        fail_ci_if_error: false

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: e2e/playwright-report/

    - name: Stop all services
      if: always()
      run: docker compose -f docker-compose-dev.yml -f docker-compose-e2e-coverage.yml down
