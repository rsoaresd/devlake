name: test-e2e-coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e-coverage:
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Create .env file
      run: |
        cp env.example .env
        sed -i 's|127.0.0.1:3306|mysql:3306|g' .env

    - name: Start services with coverage
      run: |
        docker compose -f docker-compose-dev.yml -f docker-compose-e2e-coverage.yml up -d --build
      env:
        # Dummy value for CI e2e tests only — not a real credential
        ENCRYPTION_SECRET: "e2etestsecrete2etestsecrete2etestsecrete2etestsecrete2etestsecrete2etestsecrete2etestsecrete2etestsecrete2etestsecrete2etestsecret"

    - name: Wait for API to be ready
      run: |
        echo "Waiting for DevLake API..."
        for i in $(seq 1 120); do
          if curl -s http://localhost:8080/ping > /dev/null 2>&1; then
            echo "API ready after $((i*2))s"
            break
          fi
          sleep 2
        done
        curl -sf http://localhost:8080/ping || (echo "API failed to start"; docker compose -f docker-compose-dev.yml -f docker-compose-e2e-coverage.yml logs devlake mysql; exit 1)

    - name: Trigger and wait for DB migration
      run: |
        curl -s http://localhost:8080/proceed-db-migration || true
        echo "Waiting for migration to complete..."
        migration_done=false
        for i in $(seq 1 60); do
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/blueprints)
          if [ "$code" = "200" ]; then
            echo "Migration complete after $((i*10))s"
            migration_done=true
            break
          fi
          sleep 10
        done
        if [ "$migration_done" != "true" ]; then
          echo "Migration did not complete (last HTTP $code)"
          docker compose -f docker-compose-dev.yml -f docker-compose-e2e-coverage.yml logs devlake
          exit 1
        fi

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '18'

    - name: Wait for Config-UI to be ready
      run: |
        echo "Waiting for Config-UI..."
        for i in $(seq 1 60); do
          if curl -s http://localhost:4000 > /dev/null 2>&1; then
            echo "Config-UI ready after $((i*2))s"
            break
          fi
          sleep 2
        done
        curl -sf http://localhost:4000 || (echo "Config-UI failed to start"; docker compose -f docker-compose-dev.yml -f docker-compose-e2e-coverage.yml logs config-ui; exit 1)

    - name: Install e2e dependencies
      run: |
        cd e2e
        npm ci
        npx playwright install chromium --with-deps

    - name: Run Playwright e2e tests
      run: |
        cd e2e
        npx playwright test basic-flow.spec.ts

    - name: Collect Go e2e coverage via coverport
      if: always()
      run: |
        mkdir -p e2e-coverage/raw
        echo "Fetching coverage from coverport server..."
        RESP=$(curl -sf http://localhost:9095/coverage) || { echo "::warning::Coverage endpoint unreachable"; exit 0; }

        echo "$RESP" | jq -r '.meta_filename' > /tmp/meta_name
        echo "$RESP" | jq -r '.meta_data' | base64 -d > "e2e-coverage/raw/$(cat /tmp/meta_name)"
        echo "$RESP" | jq -r '.counters_filename' > /tmp/counter_name
        echo "$RESP" | jq -r '.counters_data' | base64 -d > "e2e-coverage/raw/$(cat /tmp/counter_name)"

        echo "Raw coverage files:"
        ls -la e2e-coverage/raw/

        go tool covdata textfmt -i=./e2e-coverage/raw -o=./e2e-coverage/go-coverage.out
        echo "Go e2e coverage generated:"
        go tool cover -func=./e2e-coverage/go-coverage.out | tail -1

    - name: Install gpg for Codecov
      if: always()
      run: sudo apt-get update -qq && sudo apt-get install -y -qq gpg > /dev/null 2>&1

    - name: Upload Go e2e coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v5
      with:
        use_oidc: true
        flags: e2e-go
        files: e2e-coverage/go-coverage.out
        fail_ci_if_error: false

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: e2e/playwright-report/

    - name: Stop all services
      if: always()
      run: docker compose -f docker-compose-dev.yml -f docker-compose-e2e-coverage.yml down
